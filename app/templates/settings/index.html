{% extends "base.html" %}

{% block title %}Settings — Weather Archive{% endblock %}

{% block content %}
<h1>Settings</h1>
<form method="post" class="mt-4" style="max-width: 400px;">
    <div class="form-group">
        <label for="default_check_interval_minutes">Default check interval (minutes)</label>
        <input type="number" class="form-control" id="default_check_interval_minutes"
               name="default_check_interval_minutes" min="1" required
               value="{{ settings.default_check_interval_minutes }}">
        <small class="form-text text-muted">
            Used for cities without a custom interval.
        </small>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
