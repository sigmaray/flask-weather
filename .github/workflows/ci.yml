name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: weather_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d weather_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: mypy app wsgi.py

      - name: Pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/weather_test
        run: pytest -v --cov=app --cov-report=term-missing

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: weather_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d weather_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Prepare database and start app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/weather_e2e
          SECRET_KEY: e2e-secret
          SCHEDULER_ENABLED: "true"
          USE_VCR: "true"
        run: |
          flask db upgrade
          printf 'e2euser\ne2epass\ne2epass\n' | flask users-create
          flask run --port 5000 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/auth/login && break
            sleep 1
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:5000
          E2E_USERNAME: e2euser
          E2E_PASSWORD: e2epass
        run: npm test
