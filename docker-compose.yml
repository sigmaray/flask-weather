services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      FLASK_APP: wsgi:app
      INTERNAL_SCHEDULER_ENABLED: "false"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    command: >
      sh -c "flask db upgrade &&
             gunicorn --bind 0.0.0.0:5000 --workers 2 wsgi:app"
    networks:
      - infra

  worker:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
      FLASK_APP: wsgi:app
    command: flask run-worker
    depends_on:
      web:
        condition: service_healthy
    networks:
      - infra

networks:
  infra:
    external: true
    name: infra
